<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Clone | Ashish Varghese</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Roboto',sans-serif}
body{background:#0f0f0f;color:#f1f1f1}
a{text-decoration:none;color:inherit}
.back-link{position:fixed;bottom:20px;right:20px;z-index:999;padding:10px 20px;background:rgba(255,0,0,.85);color:#fff;border-radius:30px;font-size:12px;font-weight:500;text-decoration:none;display:flex;align-items:center;gap:6px;box-shadow:0 4px 15px rgba(0,0,0,.4);transition:.3s}.back-link:hover{transform:scale(1.05)}
header{position:fixed;top:0;width:100%;height:56px;background:#0f0f0f;display:flex;align-items:center;justify-content:space-between;padding:0 16px;z-index:100;border-bottom:1px solid #272727}
.h-left{display:flex;align-items:center;gap:16px}
.h-left button{background:none;border:none;color:#fff;font-size:18px;cursor:pointer;padding:8px;border-radius:50%}.h-left button:hover{background:#272727}
.yt-logo{display:flex;align-items:center;gap:4px;cursor:pointer}
.yt-logo i{color:#ff0000;font-size:30px}
.yt-logo span{font-size:21px;font-weight:700;letter-spacing:-1.5px;color:#fff}
.yt-logo sup{font-size:10px;color:#aaa;font-weight:400;margin-left:1px}
.h-center{display:flex;align-items:center;width:45%;max-width:600px}
.search-form{display:flex;flex:1}
.search-form input{flex:1;padding:8px 16px;background:#121212;border:1px solid #303030;border-radius:20px 0 0 20px;color:#fff;font-size:15px;outline:none;font-family:'Roboto',sans-serif}
.search-form input:focus{border-color:#1c62b9;background:#1a1a2e}
.search-btn{padding:0 20px;background:#272727;border:1px solid #303030;border-left:none;border-radius:0 20px 20px 0;color:#fff;cursor:pointer;font-size:16px;height:40px;transition:.2s}.search-btn:hover{background:#3a3a3a}
.mic-btn{width:40px;height:40px;border-radius:50%;background:#272727;border:none;color:#fff;margin-left:8px;cursor:pointer;font-size:16px}
.h-right{display:flex;align-items:center;gap:4px}
.h-right button{width:40px;height:40px;border-radius:50%;background:none;border:none;color:#fff;cursor:pointer;font-size:18px}.h-right button:hover{background:#272727}
.avatar-btn{width:32px;height:32px;border-radius:50%;background:#7b2ff7;font-size:14px;font-weight:500;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;color:#fff}
.sidebar{position:fixed;top:56px;left:0;width:240px;height:calc(100vh - 56px);background:#0f0f0f;overflow-y:auto;padding:12px 0;z-index:50}
.sidebar::-webkit-scrollbar{width:8px}.sidebar::-webkit-scrollbar-thumb{background:#272727;border-radius:4px}
.sb-item{display:flex;align-items:center;gap:24px;padding:10px 24px;cursor:pointer;font-size:14px;color:#f1f1f1;border-radius:10px;margin:0 8px;transition:.15s}
.sb-item:hover{background:#272727}
.sb-item.active{background:rgba(255,255,255,.12);font-weight:500}
.sb-item i,.sb-item img{width:24px;text-align:center;font-size:20px}
.sb-item img{height:24px;border-radius:50%;object-fit:cover}
.sb-divider{height:1px;background:#272727;margin:12px 16px}
.sb-title{font-size:14px;padding:6px 24px;font-weight:500;color:#f1f1f1;margin-top:4px}
.content{margin-left:240px;margin-top:56px;padding:16px 24px}
.chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:16px;position:sticky;top:56px;background:#0f0f0f;z-index:10;padding-top:12px}
.chips::-webkit-scrollbar{display:none}
.chip{padding:6px 14px;background:#272727;border:none;border-radius:8px;color:#f1f1f1;font-size:14px;cursor:pointer;white-space:nowrap;transition:.15s;font-family:'Roboto',sans-serif;font-weight:500}
.chip.active{background:#f1f1f1;color:#0f0f0f}
.chip:hover:not(.active){background:#3a3a3a}
.video-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:16px}
.video-card{cursor:pointer;border-radius:12px;transition:.2s}
.video-card:hover .thumb-wrap img{opacity:.85}
.thumb-wrap{position:relative;border-radius:12px;overflow:hidden;aspect-ratio:16/9;background:#1a1a1a}
.thumb-wrap img{width:100%;height:100%;object-fit:cover;transition:.3s}
.duration{position:absolute;bottom:4px;right:4px;background:rgba(0,0,0,.9);color:#fff;padding:2px 6px;border-radius:4px;font-size:12px;font-weight:500}
.vid-info{display:flex;gap:12px;padding:12px 0}
.ch-avatar{width:36px;height:36px;border-radius:50%;flex-shrink:0;object-fit:cover;background:#333;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fff}
.vid-title{font-size:14px;font-weight:500;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:4px}
.ch-name{font-size:12px;color:#aaa;display:flex;align-items:center;gap:4px}
.vid-meta{font-size:12px;color:#aaa}
/* Loading */
.loading-state{grid-column:1/-1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px;gap:16px;color:#aaa}
.spinner{width:48px;height:48px;border:3px solid rgba(255,0,0,.2);border-top-color:#ff0000;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* Skeleton cards */
.skeleton-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:16px}
.sk-card{border-radius:12px}
.sk-thumb{aspect-ratio:16/9;border-radius:12px;background:linear-gradient(90deg,#1a1a1a 25%,#272727 50%,#1a1a1a 75%);background-size:200% 100%;animation:shimmer 1.5s infinite}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.sk-line{height:14px;border-radius:4px;background:linear-gradient(90deg,#1a1a1a 25%,#272727 50%,#1a1a1a 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;margin-top:12px}
.sk-line.w80{width:80%}
.sk-line.w60{width:60%}
.sk-line.w40{width:40%}
/* Search notice */
.search-notice{display:flex;align-items:center;gap:10px;color:#aaa;font-size:13px;padding:8px 0 16px;margin-bottom:8px}
.search-notice b{color:#f1f1f1}
.clear-btn{margin-left:auto;background:none;border:1px solid #555;color:#aaa;padding:4px 12px;border-radius:20px;cursor:pointer;font-size:12px;transition:.2s}.clear-btn:hover{border-color:#f1f1f1;color:#f1f1f1}
/* Player Modal */
.player-modal{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:500;display:none;align-items:center;justify-content:center;flex-direction:column}
.player-modal.open{display:flex}
.player-close{position:absolute;top:16px;right:24px;background:none;border:none;color:#fff;font-size:28px;cursor:pointer;z-index:10;transition:.3s}.player-close:hover{color:#ff0000}
.player-frame{width:90%;max-width:900px;aspect-ratio:16/9;border-radius:12px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.8)}
.player-frame iframe{width:100%;height:100%;border:none}
.player-info{width:90%;max-width:900px;margin-top:16px}
.player-title{color:#fff;font-size:18px;font-weight:500;margin-bottom:6px}
.player-meta{color:#aaa;font-size:13px}
/* Error */
.error-state{grid-column:1/-1;text-align:center;padding:60px;color:#aaa}
.error-state i{font-size:48px;margin-bottom:16px;display:block;color:#ff0000}
@media(max-width:1200px){.sidebar{display:none}.content{margin-left:0}}
@media(max-width:600px){.video-grid{grid-template-columns:1fr}.h-center{display:none}.content{padding:16px 12px}}
</style>
</head>
<body>
<header>
  <div class="h-left">
    <button><i class="fa-solid fa-bars"></i></button>
    <div class="yt-logo"><i class="fa-brands fa-youtube"></i><span>YouTube</span><sup>IN</sup></div>
  </div>
  <div class="h-center">
    <form class="search-form" onsubmit="doSearch();return false;">
      <input type="text" id="searchInput" placeholder="Search any video...">
      <button class="search-btn" type="submit"><i class="fa-solid fa-magnifying-glass"></i></button>
    </form>
    <button class="mic-btn"><i class="fa-solid fa-microphone"></i></button>
  </div>
  <div class="h-right">
    <button><i class="fa-solid fa-video-camera"></i></button>
    <button><i class="fa-solid fa-bell"></i></button>
    <div class="avatar-btn">A</div>
  </div>
</header>

<nav class="sidebar">
  <div class="sb-item active"><i class="fa-solid fa-house"></i>Home</div>
  <div class="sb-item"><i class="fa-brands fa-youtube"></i>Shorts</div>
  <div class="sb-item"><i class="fa-solid fa-list"></i>Subscriptions</div>
  <div class="sb-divider"></div>
  <div class="sb-title">You ›</div>
  <div class="sb-item"><i class="fa-solid fa-clock-rotate-left"></i>History</div>
  <div class="sb-item"><i class="fa-solid fa-list-ul"></i>Playlists</div>
  <div class="sb-item"><i class="fa-solid fa-clock"></i>Watch Later</div>
  <div class="sb-item"><i class="fa-solid fa-thumbs-up"></i>Liked Videos</div>
  <div class="sb-divider"></div>
  <div class="sb-title">Explore</div>
  <div class="sb-item" onclick="loadChip('Trending')"><i class="fa-solid fa-fire"></i>Trending</div>
  <div class="sb-item" onclick="loadChip('Music')"><i class="fa-solid fa-music"></i>Music</div>
  <div class="sb-item" onclick="loadChip('Gaming')"><i class="fa-solid fa-gamepad"></i>Gaming</div>
  <div class="sb-item" onclick="loadChip('News')"><i class="fa-solid fa-newspaper"></i>News</div>
  <div class="sb-item" onclick="loadChip('Sports')"><i class="fa-solid fa-trophy"></i>Sports</div>
</nav>

<main class="content">
  <div class="chips" id="chips"></div>
  <div id="searchNotice"></div>
  <div class="video-grid" id="videoGrid"></div>
</main>

<div class="player-modal" id="playerModal">
  <button class="player-close" onclick="closePlayer()"><i class="fa-solid fa-xmark"></i></button>
  <div class="player-frame">
    <iframe id="playerIframe" allow="autoplay;encrypted-media;picture-in-picture" allowfullscreen></iframe>
  </div>
  <div class="player-info">
    <div class="player-title" id="playerTitle"></div>
    <div class="player-meta" id="playerMeta"></div>
  </div>
</div>

<a href="../index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Portfolio</a>

<script>
// ============================================================
// Uses Invidious API — real YouTube data, NO API key needed!
// Multiple instances for reliability
// ============================================================

const INSTANCES = [
  'https://iv.datura.network',
  'https://invidious.nerdvpn.de',
  'https://inv.nadeko.net',
  'https://invidious.privacyredirect.com',
];

let instanceIndex = 0;
function getBase(){ return INSTANCES[instanceIndex % INSTANCES.length]; }

const cats = ["All","Trending India","JavaScript","Web Dev","React","Python","Gaming","Music","Bollywood","Cricket","News","Science","Comedy","Lo-fi"];
let activeChip = "All";

// Build chips
document.getElementById("chips").innerHTML = cats.map((c,i)=>
  `<button class="chip${i===0?" active":""}" onclick="loadChip('${c}')">${c}</button>`
).join("");

function loadChip(cat){
  activeChip = cat;
  document.querySelectorAll(".chip").forEach(c=>c.classList.toggle("active", c.textContent===cat));
  document.getElementById("searchInput").value = "";
  document.getElementById("searchNotice").innerHTML = "";
  const q = cat==="All" ? "trending 2024 India" : cat==="Trending India" ? "trending India viral" : cat;
  fetchVideos(q, false);
}

function doSearch(){
  const q = document.getElementById("searchInput").value.trim();
  if(!q) return;
  document.querySelectorAll(".chip").forEach(c=>c.classList.remove("active"));
  document.getElementById("searchNotice").innerHTML = `
    <div class="search-notice">
      <i class="fa-solid fa-magnifying-glass"></i>&nbsp;
      Results for <b>"${q}"</b>
      <button class="clear-btn" onclick="loadChip('All')">✕ Clear</button>
    </div>`;
  fetchVideos(q, true);
}

function showSkeleton(){
  const grid = document.getElementById("videoGrid");
  grid.innerHTML = Array(12).fill(`
    <div class="sk-card">
      <div class="sk-thumb"></div>
      <div class="sk-line w80"></div>
      <div class="sk-line w60"></div>
      <div class="sk-line w40"></div>
    </div>`).join("");
}

async function fetchVideos(query, isSearch){
  showSkeleton();
  let lastError;
  for(let attempt=0; attempt<INSTANCES.length; attempt++){
    try {
      const base = INSTANCES[(instanceIndex+attempt) % INSTANCES.length];
      const endpoint = isSearch
        ? `${base}/api/v1/search?q=${encodeURIComponent(query)}&type=video&page=1`
        : `${base}/api/v1/search?q=${encodeURIComponent(query)}&type=video&sort_by=relevance`;
      const res = await fetch(endpoint, {signal: AbortSignal.timeout(6000)});
      if(!res.ok) throw new Error("HTTP "+res.status);
      const data = await res.json();
      const videos = Array.isArray(data) ? data : (data.items || data);
      if(!videos || videos.length===0) throw new Error("No results");
      renderVideos(videos.filter(v=>v.videoId).slice(0,12));
      instanceIndex = (instanceIndex+attempt);
      return;
    } catch(e){
      lastError = e;
    }
  }
  // All instances failed — use YouTube IDs to render directly
  renderEmbedFallback(query);
}

function formatViews(n){
  n = parseInt(n||0);
  if(n>=1e9) return (n/1e9).toFixed(1)+"B views";
  if(n>=1e6) return (n/1e6).toFixed(1)+"M views";
  if(n>=1e3) return Math.round(n/1e3)+"K views";
  return n+" views";
}

function fmtDur(s){
  s = parseInt(s||0);
  const h=Math.floor(s/3600), m=Math.floor((s%3600)/60), sec=s%60;
  if(h>0) return `${h}:${String(m).padStart(2,"0")}:${String(sec).padStart(2,"0")}`;
  return `${m}:${String(sec).padStart(2,"0")}`;
}

function avatarColor(name){
  const colors=["#7b2ff7","#e91e63","#009688","#ff5722","#2196f3","#ff9800","#4caf50","#9c27b0"];
  let h=0; for(let c of (name||"?")) h=(h*31+c.charCodeAt(0))&0xffff;
  return colors[h%colors.length];
}

function renderVideos(videos){
  const grid = document.getElementById("videoGrid");
  if(!videos.length){
    grid.innerHTML=`<div class="error-state"><i class="fa-solid fa-video-slash"></i><p>No videos found. Try a different search!</p></div>`;
    return;
  }
  grid.innerHTML = videos.map(v=>{
    const vid = v.videoId;
    const title = v.title || "Untitled";
    const ch = v.author || "Unknown Channel";
    const views = v.viewCount ? formatViews(v.viewCount) : "";
    const ago = v.publishedText || "";
    const dur = v.lengthSeconds ? fmtDur(v.lengthSeconds) : "";
    // Get best thumbnail
    const thumbs = v.videoThumbnails || [];
    const thumb = thumbs.find(t=>t.quality==="high")?.url
      || thumbs.find(t=>t.quality==="medium")?.url
      || thumbs[0]?.url
      || `https://i.ytimg.com/vi/${vid}/hqdefault.jpg`;
    const initial = (ch||"?")[0].toUpperCase();
    const color = avatarColor(ch);
    const safeTitle = title.replace(/\\/g,"\\\\").replace(/'/g,"\\'").replace(/"/g,"&quot;");
    const safeCh = ch.replace(/\\/g,"\\\\").replace(/'/g,"\\'");
    return `<div class="video-card" onclick="openPlayer('${vid}','${safeTitle}','${safeCh}','${views}','${ago}')">
      <div class="thumb-wrap">
        <img src="${thumb}" alt="${title}" loading="lazy" onerror="this.src='https://i.ytimg.com/vi/${vid}/hqdefault.jpg'">
        ${dur?`<span class="duration">${dur}</span>`:""}
      </div>
      <div class="vid-info">
        <div class="ch-avatar" style="background:${color};min-width:36px">${initial}</div>
        <div>
          <div class="vid-title">${title}</div>
          <div class="ch-name">${ch} <i class="fa-solid fa-check-circle" style="font-size:11px;color:#aaa"></i></div>
          <div class="vid-meta">${[views,ago].filter(Boolean).join(" · ")}</div>
        </div>
      </div>
    </div>`;
  }).join("");
}

// Fallback: curated real YouTube videos
function renderEmbedFallback(query){
  const curated = [
    {videoId:"jNQXAC9IVRw",title:"Me at the zoo",author:"jawed",viewCount:320000000,publishedText:"19 years ago",lengthSeconds:19,videoThumbnails:[{quality:"high",url:"https://i.ytimg.com/vi/jNQXAC9IVRw/hq720.jpg"}]},
    {videoId:"hdI2bqOjy3c",title:"JavaScript Crash Course For Beginners",author:"Traversy Media",viewCount:3400000,publishedText:"2 years ago",lengthSeconds:6029,videoThumbnails:[{quality:"high",url:"https://i.ytimg.com/vi/hdI2bqOjy3c/hq720.jpg"}]},
    {videoId:"Tn6-PIqc4UM",title:"React in 100 Seconds",author:"Fireship",viewCount:4200000,publishedText:"3 years ago",lengthSeconds:147,videoThumbnails:[{quality:"high",url:"https://i.ytimg.com/vi/Tn6-PIqc4UM/hq720.jpg"}]},
    {videoId:"K74l26pE4YA",title:"CSS Flexbox in 100 Seconds",author:"Fireship",viewCount:1800000,publishedText:"2 years ago",lengthSeconds:138,videoThumbnails:[{quality:"high",url:"https://i.ytimg.com/vi/K74l26pE4YA/hq720.jpg"}]},
    {videoId:"_uQrJ0TkZlc",title:"Python for Beginners – Full Course",author:"Programming with Mosh",viewCount:28000000,publishedText:"4 years ago",lengthSeconds:22447,videoThumbnails:[{quality:"high",url:"https://i.ytimg.com/vi/_uQrJ0TkZlc/hq720.jpg"}]},
    {videoId:"MIYQR-Ybrn4",title:"Build A Weather App With HTML CSS & JavaScript",author:"developedbyed",viewCount:892000,publishedText:"2 years ago",lengthSeconds:2853,videoThumbnails:[{quality:"high",url:"https://i.ytimg.com/vi/MIYQR-Ybrn4/hq720.jpg"}]},
    {videoId:"oYRda7UtuhA",title:"Build a Complete Responsive Website",author:"GreatStack",viewCount:2100000,publishedText:"1 year ago",lengthSeconds:6872,videoThumbnails:[{quality:"high",url:"https://i.ytimg.com/vi/oYRda7UtuhA/hq720.jpg"}]},
    {videoId:"f2EqECiTBL8",title:"Node.js Full Course for Beginners",author:"Dave Gray",viewCount:1900000,publishedText:"2 years ago",lengthSeconds:25200,videoThumbnails:[{quality:"high",url:"https://i.ytimg.com/vi/f2EqECiTBL8/hq720.jpg"}]},
    {videoId:"2pZmKW9-I_k",title:"TypeScript Tutorial for Beginners",author:"The Net Ninja",viewCount:900000,publishedText:"1 year ago",lengthSeconds:3261,videoThumbnails:[{quality:"high",url:"https://i.ytimg.com/vi/2pZmKW9-I_k/hq720.jpg"}]},
    {videoId:"-56x56UppqQ",title:"MongoDB Crash Course",author:"Traversy Media",viewCount:1500000,publishedText:"3 years ago",lengthSeconds:2203,videoThumbnails:[{quality:"high",url:"https://i.ytimg.com/vi/-56x56UppqQ/hq720.jpg"}]},
    {videoId:"tRZGeaHPoaw",title:"Git & GitHub Tutorial for Beginners",author:"Kevin Powell",viewCount:1100000,publishedText:"1 year ago",lengthSeconds:2700,videoThumbnails:[{quality:"high",url:"https://i.ytimg.com/vi/tRZGeaHPoaw/hq720.jpg"}]},
    {videoId:"DenUCuq4G04",title:"Tailwind CSS Full Course 2024",author:"Net Ninja",viewCount:567000,publishedText:"8 months ago",lengthSeconds:8130,videoThumbnails:[{quality:"high",url:"https://i.ytimg.com/vi/DenUCuq4G04/hq720.jpg"}]},
  ];
  renderVideos(curated);
}

function openPlayer(vid, title, ch, views, ago){
  document.getElementById("playerIframe").src = `https://www.youtube.com/embed/${vid}?autoplay=1&rel=0&modestbranding=1`;
  document.getElementById("playerTitle").textContent = title;
  document.getElementById("playerMeta").textContent = [ch, views, ago].filter(Boolean).join(" · ");
  document.getElementById("playerModal").classList.add("open");
  document.body.style.overflow = "hidden";
}

function closePlayer(){
  document.getElementById("playerIframe").src = "";
  document.getElementById("playerModal").classList.remove("open");
  document.body.style.overflow = "";
}

document.getElementById("playerModal").addEventListener("click", e=>{ if(e.target.id==="playerModal") closePlayer(); });
document.addEventListener("keydown", e=>{ if(e.key==="Escape") closePlayer(); });

// Start
loadChip("All");
</script>
</body>
</html>
