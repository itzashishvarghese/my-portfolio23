<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Clone | Ashish Varghese</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Roboto',sans-serif}
body{background:#0f0f0f;color:#f1f1f1}
a{text-decoration:none;color:inherit}
.back-link{position:fixed;bottom:20px;right:20px;z-index:999;padding:10px 20px;background:rgba(255,0,0,.85);color:#fff;border-radius:30px;font-size:12px;font-weight:500;text-decoration:none;display:flex;align-items:center;gap:6px;box-shadow:0 4px 15px rgba(0,0,0,.4);transition:.3s}.back-link:hover{transform:scale(1.05)}
/* Header */
header{position:fixed;top:0;width:100%;height:56px;background:#0f0f0f;display:flex;align-items:center;justify-content:space-between;padding:0 16px;z-index:100;border-bottom:1px solid #272727}
.h-left{display:flex;align-items:center;gap:16px}
.h-left button{background:none;border:none;color:#fff;font-size:18px;cursor:pointer;padding:8px;border-radius:50%}.h-left button:hover{background:#272727}
.yt-logo{display:flex;align-items:center;gap:1px;cursor:pointer}
.yt-logo i{color:#ff0000;font-size:30px}
.yt-logo span{font-size:21px;font-weight:700;letter-spacing:-1.5px;color:#fff}
.yt-logo sup{font-size:10px;color:#aaa;font-weight:400;margin-left:1px}
.h-center{display:flex;align-items:center;width:45%;max-width:600px}
.search-form{display:flex;flex:1}
.search-form input{flex:1;padding:8px 16px;background:#121212;border:1px solid #303030;border-radius:20px 0 0 20px;color:#fff;font-size:15px;outline:none;font-family:'Roboto',sans-serif}
.search-form input:focus{border-color:#1c62b9;background:#1a1a2e}
.search-form button{padding:0 24px;background:#272727;border:1px solid #303030;border-left:none;border-radius:0 20px 20px 0;color:#fff;cursor:pointer;font-size:16px}
.search-form button:hover{background:#333}
.mic-btn{width:40px;height:40px;border-radius:50%;background:#272727;border:none;color:#fff;margin-left:8px;cursor:pointer;font-size:16px}.mic-btn:hover{background:#333}
.h-right{display:flex;align-items:center;gap:4px}
.h-right button{width:40px;height:40px;border-radius:50%;background:none;border:none;color:#fff;cursor:pointer;font-size:18px}.h-right button:hover{background:#272727}
.avatar-btn{width:32px;height:32px;border-radius:50%;background:#7b2ff7;font-size:14px;font-weight:500;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;color:#fff}
/* Sidebar */
.sidebar{position:fixed;top:56px;left:0;width:240px;height:calc(100vh - 56px);background:#0f0f0f;overflow-y:auto;padding:12px 0;z-index:50}
.sidebar::-webkit-scrollbar{width:8px}.sidebar::-webkit-scrollbar-thumb{background:#272727;border-radius:4px}
.sb-item{display:flex;align-items:center;gap:24px;padding:10px 24px;cursor:pointer;font-size:14px;color:#f1f1f1;border-radius:10px;margin:0 8px;transition:.15s}
.sb-item:hover{background:#272727}
.sb-item.active{background:rgba(255,255,255,.12);font-weight:500}
.sb-item i,.sb-item img{width:24px;text-align:center;font-size:20px}
.sb-item img{height:24px;border-radius:50%;object-fit:cover}
.sb-divider{height:1px;background:#272727;margin:12px 16px}
.sb-title{font-size:14px;padding:6px 24px;font-weight:500;color:#f1f1f1;margin-top:4px}
/* Content */
.content{margin-left:240px;margin-top:56px;padding:16px 24px}
/* Chips */
.chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:20px;position:sticky;top:56px;background:#0f0f0f;z-index:10;padding-top:12px}
.chips::-webkit-scrollbar{display:none}
.chip{padding:6px 14px;background:#272727;border:none;border-radius:8px;color:#f1f1f1;font-size:14px;cursor:pointer;white-space:nowrap;transition:.15s;font-family:'Roboto',sans-serif;font-weight:500}
.chip.active{background:#f1f1f1;color:#0f0f0f}
.chip:hover:not(.active){background:#3a3a3a}
/* Video Grid */
.video-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:16px 16px}
.video-card{cursor:pointer;border-radius:12px;transition:.2s}
.thumb-wrap{position:relative;border-radius:12px;overflow:hidden;aspect-ratio:16/9;background:#1a1a1a}
.thumb-wrap img{width:100%;height:100%;object-fit:cover;transition:.3s}
.video-card:hover .thumb-wrap img{border-radius:0}
.duration{position:absolute;bottom:4px;right:4px;background:rgba(0,0,0,.9);color:#fff;padding:2px 6px;border-radius:4px;font-size:12px;font-weight:500}
.progress-bar-thumb{position:absolute;bottom:0;left:0;height:3px;background:red;border-radius:0 2px 0 0}
.vid-info{display:flex;gap:12px;padding:12px 0}
.ch-avatar{width:36px;height:36px;border-radius:50%;flex-shrink:0;object-fit:cover}
.vid-title{font-size:14px;font-weight:500;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:4px}
.ch-name{font-size:12px;color:#aaa;display:flex;align-items:center;gap:4px}.ch-name:hover{color:#f1f1f1}
.vid-meta{font-size:12px;color:#aaa}
/* Video Player Modal */
.player-modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.92);z-index:500;display:none;align-items:center;justify-content:center;flex-direction:column}
.player-modal.open{display:flex}
.player-close{position:absolute;top:16px;right:24px;background:none;border:none;color:#fff;font-size:28px;cursor:pointer;z-index:10;transition:.3s}.player-close:hover{color:#ff0000}
.player-frame{width:90%;max-width:900px;aspect-ratio:16/9;border-radius:12px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.7)}
.player-frame iframe{width:100%;height:100%;border:none}
.player-title{color:#fff;font-size:18px;font-weight:500;margin-top:16px;max-width:900px;width:90%;text-align:left}
.player-meta{color:#aaa;font-size:13px;margin-top:6px;max-width:900px;width:90%;text-align:left}
@media(max-width:1200px){.sidebar{display:none}.content{margin-left:0}}
@media(max-width:600px){.video-grid{grid-template-columns:1fr}.h-center{display:none}.content{padding:16px 12px}}
</style>
</head>
<body>
<header>
  <div class="h-left"><button><i class="fa-solid fa-bars"></i></button><div class="yt-logo"><i class="fa-brands fa-youtube"></i><span>YouTube</span><sup>IN</sup></div></div>
  <div class="h-center"><form class="search-form" onsubmit="return false"><input type="text" id="searchInput" placeholder="Search"></form><button class="search-form" style="padding:0 20px;background:#272727;border:1px solid #303030;border-left:none;border-radius:0 20px 20px 0;color:#fff;cursor:pointer;font-size:16px;height:40px"><i class="fa-solid fa-magnifying-glass"></i></button><button class="mic-btn"><i class="fa-solid fa-microphone"></i></button></div>
  <div class="h-right"><button><i class="fa-solid fa-video-camera"></i></button><button><i class="fa-solid fa-bell"></i></button><div class="avatar-btn">A</div></div>
</header>
<nav class="sidebar">
  <div class="sb-item active"><i class="fa-solid fa-house"></i>Home</div>
  <div class="sb-item"><i class="fa-brands fa-youtube"></i>Shorts</div>
  <div class="sb-item"><i class="fa-solid fa-list"></i>Subscriptions</div>
  <div class="sb-divider"></div>
  <div class="sb-title">You ›</div>
  <div class="sb-item"><i class="fa-solid fa-clock-rotate-left"></i>History</div>
  <div class="sb-item"><i class="fa-solid fa-list-ul"></i>Playlists</div>
  <div class="sb-item"><i class="fa-solid fa-clock"></i>Watch Later</div>
  <div class="sb-item"><i class="fa-solid fa-thumbs-up"></i>Liked Videos</div>
  <div class="sb-item"><i class="fa-solid fa-download"></i>Downloads</div>
  <div class="sb-divider"></div>
  <div class="sb-title">Subscriptions</div>
  <div class="sb-item"><img src="https://i.pravatar.cc/24?img=11">Traversy Media</div>
  <div class="sb-item"><img src="https://i.pravatar.cc/24?img=12">Fireship</div>
  <div class="sb-item"><img src="https://i.pravatar.cc/24?img=13">Web Dev Simplified</div>
  <div class="sb-item"><img src="https://i.pravatar.cc/24?img=14">The Net Ninja</div>
  <div class="sb-item"><img src="https://i.pravatar.cc/24?img=15">Kevin Powell</div>
  <div class="sb-divider"></div>
  <div class="sb-title">Explore</div>
  <div class="sb-item"><i class="fa-solid fa-fire"></i>Trending</div>
  <div class="sb-item"><i class="fa-solid fa-bag-shopping"></i>Shopping</div>
  <div class="sb-item"><i class="fa-solid fa-music"></i>Music</div>
  <div class="sb-item"><i class="fa-solid fa-gamepad"></i>Gaming</div>
  <div class="sb-item"><i class="fa-solid fa-newspaper"></i>News</div>
  <div class="sb-item"><i class="fa-solid fa-trophy"></i>Sports</div>
</nav>
<main class="content">
  <div class="chips" id="chips"></div>
  <div class="video-grid" id="videoGrid"></div>
</main>
<div class="player-modal" id="playerModal">
  <button class="player-close" onclick="closePlayer()"><i class="fa-solid fa-xmark"></i></button>
  <div class="player-frame"><iframe id="playerIframe" allow="autoplay;encrypted-media" allowfullscreen></iframe></div>
  <div class="player-title" id="playerTitle"></div>
  <div class="player-meta" id="playerMeta"></div>
</div>
<a href="../index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Portfolio</a>
<script>
const cats=["All","Mixes","Music","JavaScript","CSS","React","Live","Gaming","Podcasts","Comedy","Web Development","Lo-fi","Coding","News"];
document.getElementById("chips").innerHTML=cats.map((c,i)=>`<button class="chip${i===0?" active":""}" onclick="document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));this.classList.add('active')">${c}</button>`).join("");

const videos=[
  {title:"JavaScript Crash Course For Beginners",channel:"Traversy Media",channelImg:"https://yt3.ggpht.com/ytc/AIdro_kDo4TLJTiQ-q8dchpvmhCjG3bHWNGm2pLevD4YQ84GDA=s68-c-k-c0x00ffffff-no-rj",views:"3.4M views",time:"2 years ago",dur:"1:40:29",ytId:"hdI2bqOjy3c",thumb:"https://i.ytimg.com/vi/hdI2bqOjy3c/hq720.jpg",progress:65},
  {title:"CSS Flexbox in 100 Seconds",channel:"Fireship",channelImg:"https://yt3.ggpht.com/ytc/AIdro_nJCwGTDqL2mFwoPFRnmUlBPnH2W1l-4vFYqR10ORGEfw=s68-c-k-c0x00ffffff-no-rj",views:"1.8M views",time:"1 year ago",dur:"2:18",ytId:"K74l26pE4YA",thumb:"https://i.ytimg.com/vi/K74l26pE4YA/hq720.jpg",progress:0},
  {title:"React in 100 Seconds",channel:"Fireship",channelImg:"https://yt3.ggpht.com/ytc/AIdro_nJCwGTDqL2mFwoPFRnmUlBPnH2W1l-4vFYqR10ORGEfw=s68-c-k-c0x00ffffff-no-rj",views:"4.2M views",time:"3 years ago",dur:"2:27",ytId:"Tn6-PIqc4UM",thumb:"https://i.ytimg.com/vi/Tn6-PIqc4UM/hq720.jpg",progress:0},
  {title:"Build A Weather App With HTML CSS & JavaScript",channel:"Developedbyed",channelImg:"https://yt3.ggpht.com/ytc/AIdro_lb4Qad_Gn4x5J4Y-f2GX4Vg6v1IniXZI9GVFYfLXV9A=s68-c-k-c0x00ffffff-no-rj",views:"892K views",time:"2 years ago",dur:"47:33",ytId:"MIYQR-Ybrn4",thumb:"https://i.ytimg.com/vi/MIYQR-Ybrn4/hq720.jpg",progress:30},
  {title:"Build a Complete Responsive Website Using HTML & CSS",channel:"GreatStack",channelImg:"https://i.pravatar.cc/36?img=20",views:"2.1M views",time:"1 year ago",dur:"1:54:32",ytId:"oYRda7UtuhA",thumb:"https://i.ytimg.com/vi/oYRda7UtuhA/hq720.jpg",progress:0},
  {title:"Tailwind CSS Full Course 2024",channel:"Net Ninja",channelImg:"https://i.pravatar.cc/36?img=15",views:"567K views",time:"8 months ago",dur:"2:15:30",ytId:"DenUCuq4G04",thumb:"https://i.ytimg.com/vi/DenUCuq4G04/hq720.jpg",progress:0},
  {title:"Git & GitHub Tutorial for Beginners",channel:"Kevin Powell",channelImg:"https://i.pravatar.cc/36?img=13",views:"1.1M views",time:"1 year ago",dur:"45:00",ytId:"tRZGeaHPoaw",thumb:"https://i.ytimg.com/vi/tRZGeaHPoaw/hq720.jpg",progress:0},
  {title:"Node.js Full Course for Beginners",channel:"Dave Gray",channelImg:"https://i.pravatar.cc/36?img=16",views:"1.9M views",time:"2 years ago",dur:"7:00:00",ytId:"f2EqECiTBL8",thumb:"https://i.ytimg.com/vi/f2EqECiTBL8/hq720.jpg",progress:12},
  {title:"Python for Beginners – Full Course",channel:"Programming with Mosh",channelImg:"https://i.pravatar.cc/36?img=18",views:"28M views",time:"4 years ago",dur:"6:14:07",ytId:"_uQrJ0TkZlc",thumb:"https://i.ytimg.com/vi/_uQrJ0TkZlc/hq720.jpg",progress:0},
  {title:"MongoDB Crash Course",channel:"Traversy Media",channelImg:"https://yt3.ggpht.com/ytc/AIdro_kDo4TLJTiQ-q8dchpvmhCjG3bHWNGm2pLevD4YQ84GDA=s68-c-k-c0x00ffffff-no-rj",views:"1.5M views",time:"3 years ago",dur:"36:43",ytId:"-56x56UppqQ",thumb:"https://i.ytimg.com/vi/-56x56UppqQ/hq720.jpg",progress:0},
  {title:"TypeScript Tutorial for Beginners",channel:"The Net Ninja",channelImg:"https://i.pravatar.cc/36?img=14",views:"900K views",time:"1 year ago",dur:"54:21",ytId:"2pZmKW9-I_k",thumb:"https://i.ytimg.com/vi/2pZmKW9-I_k/hq720.jpg",progress:0},
  {title:"Build 5 Projects With HTML, CSS & JavaScript",channel:"Traversy Media",channelImg:"https://yt3.ggpht.com/ytc/AIdro_kDo4TLJTiQ-q8dchpvmhCjG3bHWNGm2pLevD4YQ84GDA=s68-c-k-c0x00ffffff-no-rj",views:"678K views",time:"6 months ago",dur:"1:28:45",ytId:"Jk5JhDjAQ_k",thumb:"https://i.ytimg.com/vi/Jk5JhDjAQ_k/hq720.jpg",progress:0},
];

const grid=document.getElementById("videoGrid");
grid.innerHTML=videos.map((v,i)=>`<div class="video-card" onclick="openPlayer(${i})"><div class="thumb-wrap"><img src="${v.thumb}" alt="${v.title}" loading="lazy"><span class="duration">${v.dur}</span>${v.progress?`<div class="progress-bar-thumb" style="width:${v.progress}%"></div>`:""}</div><div class="vid-info"><img class="ch-avatar" src="${v.channelImg}" alt="${v.channel}"><div><div class="vid-title">${v.title}</div><div class="ch-name">${v.channel} <i class="fa-solid fa-check-circle" style="font-size:12px;color:#aaa"></i></div><div class="vid-meta">${v.views} · ${v.time}</div></div></div></div>`).join("");

function openPlayer(i){
  const v=videos[i];
  document.getElementById("playerIframe").src="https://www.youtube.com/embed/"+v.ytId+"?autoplay=1&rel=0";
  document.getElementById("playerTitle").textContent=v.title;
  document.getElementById("playerMeta").textContent=v.channel+" · "+v.views+" · "+v.time;
  document.getElementById("playerModal").classList.add("open");
  document.body.style.overflow="hidden";
}
function closePlayer(){
  document.getElementById("playerIframe").src="";
  document.getElementById("playerModal").classList.remove("open");
  document.body.style.overflow="";
}
document.getElementById("playerModal").addEventListener("click",e=>{if(e.target.id==="playerModal")closePlayer()});
document.addEventListener("keydown",e=>{if(e.key==="Escape")closePlayer()});
document.getElementById("searchInput").addEventListener("input",function(){const q=this.value.toLowerCase();document.querySelectorAll(".video-card").forEach((c,i)=>{c.style.display=videos[i].title.toLowerCase().includes(q)||videos[i].channel.toLowerCase().includes(q)?"":"none"})});
</script>
</body>
</html>
