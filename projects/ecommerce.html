<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TechStore — E-Commerce | Ashish Varghese</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
:root{--bg:#0a0e1a;--card:#131833;--accent:#00d4ff;--text:#e4e6eb;--glass:rgba(19,24,51,0.7)}
body{background:var(--bg);color:var(--text);min-height:100vh}
.back-link{display:inline-flex;align-items:center;gap:8px;padding:15px 30px;color:var(--accent);font-size:14px;text-decoration:none;transition:.3s}
.back-link:hover{opacity:.7}
.store-header{padding:15px 30px;background:var(--glass);backdrop-filter:blur(12px);border-bottom:1px solid rgba(0,212,255,.1);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
.store-logo{font-size:24px;font-weight:700;color:var(--text)}
.store-logo span{color:var(--accent)}
.header-right{display:flex;align-items:center;gap:20px}
.search-box{display:flex;align-items:center;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:25px;padding:8px 16px;width:300px;transition:.3s}
.search-box:focus-within{border-color:var(--accent);box-shadow:0 0 15px rgba(0,212,255,.15)}
.search-box input{background:none;border:none;outline:none;color:var(--text);width:100%;font-size:14px}
.search-box i{color:rgba(255,255,255,.3);margin-right:8px}
.cart-btn{position:relative;background:none;border:2px solid var(--accent);color:var(--accent);width:42px;height:42px;border-radius:50%;cursor:pointer;font-size:18px;transition:.3s;display:flex;align-items:center;justify-content:center}
.cart-btn:hover{background:var(--accent);color:var(--bg)}
.cart-count{position:absolute;top:-5px;right:-5px;background:#ff4757;color:#fff;font-size:11px;font-weight:700;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.filters{padding:20px 30px;display:flex;gap:10px;flex-wrap:wrap}
.filter-btn{padding:8px 20px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.03);color:var(--text);border-radius:20px;cursor:pointer;font-size:13px;transition:.3s;font-family:'Poppins',sans-serif}
.filter-btn.active,.filter-btn:hover{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.products{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px;padding:10px 30px 40px}
.product-card{background:var(--card);border-radius:16px;overflow:hidden;border:1px solid rgba(255,255,255,.05);transition:.4s;cursor:pointer}
.product-card:hover{transform:translateY(-6px);box-shadow:0 15px 40px rgba(0,212,255,.12);border-color:rgba(0,212,255,.2)}
.product-img{width:100%;height:200px;object-fit:cover;transition:.4s}
.product-card:hover .product-img{transform:scale(1.05)}
.product-img-wrap{overflow:hidden}
.product-info{padding:16px}
.product-name{font-size:16px;font-weight:600;margin-bottom:4px}
.product-cat{font-size:12px;color:rgba(255,255,255,.4);margin-bottom:8px}
.product-price{font-size:20px;font-weight:700;color:var(--accent)}
.product-price .old{font-size:14px;color:rgba(255,255,255,.3);text-decoration:line-through;margin-left:8px;font-weight:400}
.stars{color:#ffc107;font-size:12px;margin:8px 0}
.add-btn{width:100%;padding:10px;background:linear-gradient(135deg,#00d4ff,#0098b3);color:var(--bg);border:none;border-radius:10px;font-weight:600;font-size:14px;cursor:pointer;transition:.3s;font-family:'Poppins',sans-serif}
.add-btn:hover{box-shadow:0 4px 20px rgba(0,212,255,.4);transform:translateY(-1px)}
.add-btn.added{background:linear-gradient(135deg,#00e676,#00c853)}
/* Cart Sidebar */
.cart-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);z-index:200;opacity:0;visibility:hidden;transition:.3s}
.cart-overlay.open{opacity:1;visibility:visible}
.cart-sidebar{position:fixed;top:0;right:-420px;width:400px;max-width:90vw;height:100%;background:var(--card);z-index:201;transition:.4s;display:flex;flex-direction:column;border-left:1px solid rgba(0,212,255,.1)}
.cart-sidebar.open{right:0}
.cart-header{padding:20px;border-bottom:1px solid rgba(255,255,255,.05);display:flex;justify-content:space-between;align-items:center}
.cart-header h2{font-size:20px}
.close-cart{background:none;border:none;color:var(--text);font-size:22px;cursor:pointer;transition:.3s}
.close-cart:hover{color:var(--accent)}
.cart-items{flex:1;overflow-y:auto;padding:15px}
.cart-item{display:flex;align-items:center;gap:12px;padding:12px;background:rgba(255,255,255,.03);border-radius:12px;margin-bottom:10px}
.cart-item img{width:60px;height:60px;border-radius:8px;object-fit:cover}
.cart-item-info{flex:1}
.cart-item-name{font-size:14px;font-weight:500}
.cart-item-price{color:var(--accent);font-weight:600;font-size:15px}
.cart-item-qty{display:flex;align-items:center;gap:8px}
.qty-btn{width:26px;height:26px;border-radius:6px;border:1px solid rgba(255,255,255,.1);background:none;color:var(--text);cursor:pointer;transition:.2s;font-size:14px}
.qty-btn:hover{border-color:var(--accent);color:var(--accent)}
.remove-item{background:none;border:none;color:#ff4757;cursor:pointer;font-size:16px;padding:4px;transition:.3s}
.remove-item:hover{transform:scale(1.2)}
.cart-footer{padding:20px;border-top:1px solid rgba(255,255,255,.05)}
.cart-total{display:flex;justify-content:space-between;font-size:18px;font-weight:700;margin-bottom:15px}
.cart-total span:last-child{color:var(--accent)}
.checkout-btn{width:100%;padding:14px;background:linear-gradient(135deg,#00d4ff,#7b2ff7);color:#fff;border:none;border-radius:12px;font-weight:600;font-size:16px;cursor:pointer;transition:.3s;font-family:'Poppins',sans-serif}
.checkout-btn:hover{box-shadow:0 6px 25px rgba(0,212,255,.4)}
.empty-cart{text-align:center;padding:40px;opacity:.4;font-size:14px}
.empty-cart i{font-size:48px;margin-bottom:10px;display:block}
@media(max-width:768px){.search-box{width:180px}.products{grid-template-columns:repeat(2,1fr);padding:10px 15px}.filters{padding:15px}.store-header{padding:10px 15px}}
@media(max-width:480px){.products{grid-template-columns:1fr}.search-box{display:none}}
</style>
</head>
<body>
<a href="../index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to Portfolio</a>
<header class="store-header">
  <div class="store-logo">Tech<span>Store</span></div>
  <div class="header-right">
    <div class="search-box"><i class="fa-solid fa-search"></i><input type="text" id="searchInput" placeholder="Search products..."></div>
    <button class="cart-btn" id="cartBtn"><i class="fa-solid fa-cart-shopping"></i><span class="cart-count" id="cartCount">0</span></button>
  </div>
</header>
<div class="filters" id="filters">
  <button class="filter-btn active" data-cat="all">All</button>
  <button class="filter-btn" data-cat="laptop">Laptops</button>
  <button class="filter-btn" data-cat="phone">Phones</button>
  <button class="filter-btn" data-cat="accessory">Accessories</button>
  <button class="filter-btn" data-cat="audio">Audio</button>
</div>
<div class="products" id="productsGrid"></div>
<div class="cart-overlay" id="cartOverlay"></div>
<aside class="cart-sidebar" id="cartSidebar">
  <div class="cart-header"><h2>🛒 Your Cart</h2><button class="close-cart" id="closeCart"><i class="fa-solid fa-xmark"></i></button></div>
  <div class="cart-items" id="cartItems"></div>
  <div class="cart-footer"><div class="cart-total"><span>Total:</span><span id="cartTotal">$0.00</span></div><button class="checkout-btn">Proceed to Checkout</button></div>
</aside>
<script>
const products=[
  {id:1,name:"MacBook Pro 16\"",cat:"laptop",price:2499,old:2799,rating:5,img:"https://picsum.photos/seed/macbook16/400/300"},
  {id:2,name:"Dell XPS 15",cat:"laptop",price:1899,old:2199,rating:4,img:"https://picsum.photos/seed/dellxps/400/300"},
  {id:3,name:"iPhone 15 Pro",cat:"phone",price:1199,old:1299,rating:5,img:"https://picsum.photos/seed/iphone15p/400/300"},
  {id:4,name:"Samsung Galaxy S24",cat:"phone",price:999,old:1099,rating:4,img:"https://picsum.photos/seed/samsungs24/400/300"},
  {id:5,name:"AirPods Pro 2",cat:"audio",price:249,old:279,rating:5,img:"https://picsum.photos/seed/airpodsp/400/300"},
  {id:6,name:"Sony WH-1000XM5",cat:"audio",price:349,old:399,rating:5,img:"https://picsum.photos/seed/sonyxm5/400/300"},
  {id:7,name:"Logitech MX Master 3S",cat:"accessory",price:99,old:129,rating:4,img:"https://picsum.photos/seed/mxmaster/400/300"},
  {id:8,name:"Apple Watch Ultra 2",cat:"accessory",price:799,old:899,rating:5,img:"https://picsum.photos/seed/watchultra/400/300"},
];
let cart=[];
const grid=document.getElementById("productsGrid");
const cartBtn=document.getElementById("cartBtn");
const cartSidebar=document.getElementById("cartSidebar");
const cartOverlay=document.getElementById("cartOverlay");
const closeCart=document.getElementById("closeCart");
const cartCountEl=document.getElementById("cartCount");
const cartItemsEl=document.getElementById("cartItems");
const cartTotalEl=document.getElementById("cartTotal");
const searchInput=document.getElementById("searchInput");
let activeFilter="all";

function renderProducts(filter="all",search=""){
  const filtered=products.filter(p=>(filter==="all"||p.cat===filter)&&p.name.toLowerCase().includes(search.toLowerCase()));
  grid.innerHTML=filtered.map(p=>`<div class="product-card"><div class="product-img-wrap"><img class="product-img" src="${p.img}" alt="${p.name}" loading="lazy"></div><div class="product-info"><div class="product-cat">${p.cat.charAt(0).toUpperCase()+p.cat.slice(1)}</div><div class="product-name">${p.name}</div><div class="stars">${"★".repeat(p.rating)+"☆".repeat(5-p.rating)}</div><div class="product-price">$${p.price}<span class="old">$${p.old}</span></div><button class="add-btn" onclick="addToCart(${p.id})"><i class="fa-solid fa-cart-plus"></i> Add to Cart</button></div></div>`).join("");
  if(!filtered.length) grid.innerHTML='<p style="grid-column:1/-1;text-align:center;opacity:.4;padding:40px">No products found</p>';
}

function addToCart(id){
  const existing=cart.find(c=>c.id===id);
  if(existing){existing.qty++}else{cart.push({...products.find(p=>p.id===id),qty:1})}
  updateCart();
}
function removeFromCart(id){cart=cart.filter(c=>c.id!==id);updateCart()}
function changeQty(id,d){const item=cart.find(c=>c.id===id);if(item){item.qty+=d;if(item.qty<=0)removeFromCart(id);else updateCart()}}
function updateCart(){
  cartCountEl.textContent=cart.reduce((s,c)=>s+c.qty,0);
  const total=cart.reduce((s,c)=>s+c.price*c.qty,0);
  cartTotalEl.textContent="$"+total.toFixed(2);
  if(!cart.length){cartItemsEl.innerHTML='<div class="empty-cart"><i class="fa-solid fa-cart-shopping"></i>Your cart is empty</div>';return}
  cartItemsEl.innerHTML=cart.map(c=>`<div class="cart-item"><img src="${c.img}" alt="${c.name}"><div class="cart-item-info"><div class="cart-item-name">${c.name}</div><div class="cart-item-price">$${(c.price*c.qty).toFixed(2)}</div><div class="cart-item-qty"><button class="qty-btn" onclick="changeQty(${c.id},-1)">−</button><span>${c.qty}</span><button class="qty-btn" onclick="changeQty(${c.id},1)">+</button></div></div><button class="remove-item" onclick="removeFromCart(${c.id})"><i class="fa-solid fa-trash"></i></button></div>`).join("");
}
function openCart(){cartSidebar.classList.add("open");cartOverlay.classList.add("open")}
function closeCartFn(){cartSidebar.classList.remove("open");cartOverlay.classList.remove("open")}
cartBtn.onclick=openCart;closeCart.onclick=closeCartFn;cartOverlay.onclick=closeCartFn;
document.getElementById("filters").addEventListener("click",e=>{if(e.target.classList.contains("filter-btn")){document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));e.target.classList.add("active");activeFilter=e.target.dataset.cat;renderProducts(activeFilter,searchInput.value)}});
searchInput.addEventListener("input",()=>renderProducts(activeFilter,searchInput.value));
renderProducts();updateCart();
</script>
</body>
</html>
