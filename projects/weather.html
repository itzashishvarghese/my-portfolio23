<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather App | Ashish Varghese</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
:root{--bg:#0a0e1a;--card:#131833;--accent:#00d4ff;--text:#e4e6eb;--glass:rgba(19,24,51,0.6)}
body{background:var(--bg);color:var(--text);min-height:100vh}
.back-link{display:inline-flex;align-items:center;gap:8px;padding:15px 30px;color:var(--accent);font-size:14px;text-decoration:none;transition:.3s}.back-link:hover{opacity:.7}
.app{max-width:900px;margin:0 auto;padding:0 20px 40px}
.search-wrap{display:flex;gap:10px;margin-bottom:30px}
.search-wrap input{flex:1;padding:14px 20px;background:var(--glass);backdrop-filter:blur(10px);border:1px solid rgba(0,212,255,.15);border-radius:14px;color:var(--text);font-size:16px;outline:none;transition:.3s;font-family:'Poppins',sans-serif}
.search-wrap input:focus{border-color:var(--accent);box-shadow:0 0 20px rgba(0,212,255,.15)}
.search-wrap input::placeholder{color:rgba(255,255,255,.3)}
.search-btn{padding:14px 24px;background:linear-gradient(135deg,#00d4ff,#0098b3);border:none;border-radius:14px;color:var(--bg);font-size:18px;cursor:pointer;transition:.3s}
.search-btn:hover{box-shadow:0 4px 20px rgba(0,212,255,.4)}
.main-weather{background:var(--glass);backdrop-filter:blur(12px);border:1px solid rgba(0,212,255,.1);border-radius:24px;padding:35px;margin-bottom:25px;text-align:center;position:relative;overflow:hidden}
.main-weather::before{content:'';position:absolute;top:-50px;right:-50px;width:200px;height:200px;background:radial-gradient(circle,rgba(0,212,255,.1),transparent);border-radius:50%}
.city-name{font-size:28px;font-weight:700}.country{font-size:14px;opacity:.5}
.weather-icon{font-size:80px;margin:15px 0}
.temperature{font-size:64px;font-weight:700;background:linear-gradient(135deg,#00d4ff,#7b2ff7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.description{font-size:18px;opacity:.7;margin-bottom:20px;text-transform:capitalize}
.details{display:grid;grid-template-columns:repeat(4,1fr);gap:15px}
.detail-box{background:rgba(255,255,255,.03);border-radius:14px;padding:15px;text-align:center}
.detail-box i{color:var(--accent);font-size:20px;margin-bottom:6px}
.detail-box .val{font-size:20px;font-weight:700}
.detail-box .lbl{font-size:11px;opacity:.4}
.section-title{font-size:18px;font-weight:600;margin-bottom:15px}
.forecast{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:25px}
.forecast-card{background:var(--glass);backdrop-filter:blur(10px);border:1px solid rgba(0,212,255,.08);border-radius:16px;padding:18px;text-align:center;transition:.3s}
.forecast-card:hover{border-color:rgba(0,212,255,.25);transform:translateY(-3px)}
.forecast-card .day{font-size:13px;font-weight:600;margin-bottom:6px}
.forecast-card .icon{font-size:32px;margin:8px 0}
.forecast-card .temps{font-size:14px}
.forecast-card .temps .high{font-weight:700}
.forecast-card .temps .low{opacity:.4;margin-left:4px}
.hourly{display:flex;gap:12px;overflow-x:auto;padding-bottom:10px;margin-bottom:25px}
.hourly::-webkit-scrollbar{height:4px}.hourly::-webkit-scrollbar-thumb{background:var(--accent);border-radius:4px}
.hour-card{min-width:80px;background:var(--glass);border:1px solid rgba(0,212,255,.08);border-radius:14px;padding:14px 10px;text-align:center;flex-shrink:0;transition:.3s}
.hour-card:hover{border-color:rgba(0,212,255,.25)}
.hour-card .time{font-size:12px;opacity:.5}
.hour-card .hicon{font-size:24px;margin:6px 0}
.hour-card .htemp{font-size:16px;font-weight:600}
.extras{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.extra-card{background:var(--glass);border:1px solid rgba(0,212,255,.08);border-radius:14px;padding:18px;text-align:center;transition:.3s}
.extra-card:hover{border-color:rgba(0,212,255,.2)}
.extra-card i{color:var(--accent);font-size:24px;margin-bottom:8px}
.extra-card .eval{font-size:22px;font-weight:700}
.extra-card .elbl{font-size:12px;opacity:.4}
@media(max-width:768px){.details{grid-template-columns:repeat(2,1fr)}.forecast{grid-template-columns:repeat(3,1fr)}.extras{grid-template-columns:1fr 1fr}}
@media(max-width:480px){.forecast{grid-template-columns:repeat(2,1fr)}.temperature{font-size:48px}}
</style>
</head>
<body>
<a href="../index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to Portfolio</a>
<div class="app">
  <div class="search-wrap"><input type="text" id="cityInput" placeholder="Search city... (e.g. London, Tokyo, Mumbai)"><button class="search-btn" id="searchBtn"><i class="fa-solid fa-search"></i></button></div>
  <div id="weatherContent"></div>
</div>
<script>
const cities={
  "new delhi":{temp:38,feels:42,desc:"haze",icon:"🌫️",humidity:28,wind:12,pressure:1005,uv:9,visibility:"4 km",sunrise:"05:24",sunset:"19:12",hourly:[36,37,38,38,37,35,33,31],forecast:[{day:"Mon",icon:"☀️",hi:39,lo:27},{day:"Tue",icon:"🌤️",hi:37,lo:26},{day:"Wed",icon:"⛈️",hi:34,lo:24},{day:"Thu",icon:"🌧️",hi:32,lo:23},{day:"Fri",icon:"☀️",hi:36,lo:25}]},
  "mumbai":{temp:33,feels:38,desc:"partly cloudy",icon:"🌤️",humidity:72,wind:18,pressure:1008,uv:8,visibility:"6 km",sunrise:"06:01",sunset:"19:16",hourly:[31,32,33,33,32,31,30,29],forecast:[{day:"Mon",icon:"🌧️",hi:33,lo:26},{day:"Tue",icon:"⛈️",hi:31,lo:25},{day:"Wed",icon:"🌧️",hi:30,lo:25},{day:"Thu",icon:"🌤️",hi:32,lo:26},{day:"Fri",icon:"☀️",hi:34,lo:27}]},
  "london":{temp:16,feels:14,desc:"overcast clouds",icon:"☁️",humidity:68,wind:22,pressure:1015,uv:3,visibility:"10 km",sunrise:"05:02",sunset:"21:05",hourly:[15,15,16,16,15,14,13,12],forecast:[{day:"Mon",icon:"🌧️",hi:15,lo:9},{day:"Tue",icon:"☁️",hi:16,lo:10},{day:"Wed",icon:"🌤️",hi:18,lo:11},{day:"Thu",icon:"☀️",hi:20,lo:12},{day:"Fri",icon:"🌧️",hi:14,lo:8}]},
  "new york":{temp:24,feels:25,desc:"clear sky",icon:"☀️",humidity:45,wind:14,pressure:1018,uv:7,visibility:"16 km",sunrise:"05:29",sunset:"20:18",hourly:[22,23,24,25,24,23,21,20],forecast:[{day:"Mon",icon:"☀️",hi:26,lo:17},{day:"Tue",icon:"🌤️",hi:24,lo:16},{day:"Wed",icon:"⛈️",hi:21,lo:14},{day:"Thu",icon:"🌧️",hi:19,lo:13},{day:"Fri",icon:"☀️",hi:25,lo:16}]},
  "tokyo":{temp:22,feels:23,desc:"light rain",icon:"🌧️",humidity:78,wind:10,pressure:1012,uv:4,visibility:"8 km",sunrise:"04:30",sunset:"18:50",hourly:[21,21,22,22,21,20,19,19],forecast:[{day:"Mon",icon:"🌧️",hi:22,lo:16},{day:"Tue",icon:"🌧️",hi:20,lo:15},{day:"Wed",icon:"☁️",hi:23,lo:17},{day:"Thu",icon:"🌤️",hi:25,lo:18},{day:"Fri",icon:"☀️",hi:26,lo:19}]},
  "sydney":{temp:18,feels:17,desc:"sunny",icon:"☀️",humidity:55,wind:20,pressure:1020,uv:5,visibility:"14 km",sunrise:"06:45",sunset:"17:05",hourly:[17,17,18,18,17,16,15,14],forecast:[{day:"Mon",icon:"☀️",hi:19,lo:12},{day:"Tue",icon:"🌤️",hi:18,lo:11},{day:"Wed",icon:"☁️",hi:17,lo:10},{day:"Thu",icon:"🌧️",hi:15,lo:9},{day:"Fri",icon:"☀️",hi:20,lo:13}]},
  "paris":{temp:19,feels:18,desc:"scattered clouds",icon:"⛅",humidity:62,wind:16,pressure:1016,uv:5,visibility:"12 km",sunrise:"05:55",sunset:"21:35",hourly:[17,18,19,19,18,17,16,15],forecast:[{day:"Mon",icon:"🌤️",hi:20,lo:12},{day:"Tue",icon:"☀️",hi:22,lo:13},{day:"Wed",icon:"☁️",hi:18,lo:11},{day:"Thu",icon:"🌧️",hi:16,lo:10},{day:"Fri",icon:"⛅",hi:19,lo:12}]},
  "dubai":{temp:42,feels:46,desc:"clear sky",icon:"☀️",humidity:18,wind:24,pressure:1002,uv:11,visibility:"10 km",sunrise:"05:28",sunset:"19:05",hourly:[40,41,42,43,42,41,39,38],forecast:[{day:"Mon",icon:"☀️",hi:43,lo:32},{day:"Tue",icon:"☀️",hi:44,lo:33},{day:"Wed",icon:"🌤️",hi:41,lo:31},{day:"Thu",icon:"☀️",hi:42,lo:32},{day:"Fri",icon:"☀️",hi:45,lo:34}]}
};

function render(city){
  const d=cities[city.toLowerCase()];
  if(!d){document.getElementById("weatherContent").innerHTML='<div style="text-align:center;padding:40px;opacity:.5"><h2>City not found</h2><p>Try: New Delhi, Mumbai, London, New York, Tokyo, Sydney, Paris, Dubai</p></div>';return}
  const name=city.split(" ").map(w=>w.charAt(0).toUpperCase()+w.slice(1)).join(" ");
  const now=new Date();
  const hours=Array.from({length:8},(_,i)=>{const h=(now.getHours()+i)%24;return h<10?"0"+h+":00":h+":00"});
  document.getElementById("weatherContent").innerHTML=`
    <div class="main-weather">
      <div class="city-name">${name}</div><div class="country">🌍 Weather Report</div>
      <div class="weather-icon">${d.icon}</div>
      <div class="temperature">${d.temp}°C</div>
      <div class="description">${d.desc}</div>
      <div class="details">
        <div class="detail-box"><i class="fa-solid fa-temperature-half"></i><div class="val">${d.feels}°C</div><div class="lbl">Feels Like</div></div>
        <div class="detail-box"><i class="fa-solid fa-droplet"></i><div class="val">${d.humidity}%</div><div class="lbl">Humidity</div></div>
        <div class="detail-box"><i class="fa-solid fa-wind"></i><div class="val">${d.wind} km/h</div><div class="lbl">Wind Speed</div></div>
        <div class="detail-box"><i class="fa-solid fa-gauge-high"></i><div class="val">${d.pressure}</div><div class="lbl">Pressure (hPa)</div></div>
      </div>
    </div>
    <h3 class="section-title">📅 5-Day Forecast</h3>
    <div class="forecast">${d.forecast.map(f=>`<div class="forecast-card"><div class="day">${f.day}</div><div class="icon">${f.icon}</div><div class="temps"><span class="high">${f.hi}°</span><span class="low">${f.lo}°</span></div></div>`).join("")}</div>
    <h3 class="section-title">🕐 Hourly Forecast</h3>
    <div class="hourly">${d.hourly.map((t,i)=>`<div class="hour-card"><div class="time">${hours[i]}</div><div class="hicon">${i<3?d.icon:["☀️","🌤️","⛅","☁️","🌧️"][i%5]}</div><div class="htemp">${t}°</div></div>`).join("")}</div>
    <h3 class="section-title">📊 Additional Info</h3>
    <div class="extras">
      <div class="extra-card"><i class="fa-solid fa-sun"></i><div class="eval">${d.uv}</div><div class="elbl">UV Index</div></div>
      <div class="extra-card"><i class="fa-solid fa-eye"></i><div class="eval">${d.visibility}</div><div class="elbl">Visibility</div></div>
      <div class="extra-card"><i class="fa-solid fa-cloud-sun"></i><div class="eval">${d.sunrise} / ${d.sunset}</div><div class="elbl">Sunrise / Sunset</div></div>
    </div>`;
}
document.getElementById("searchBtn").onclick=()=>render(document.getElementById("cityInput").value);
document.getElementById("cityInput").addEventListener("keydown",e=>{if(e.key==="Enter")render(e.target.value)});
render("new delhi");
</script>
</body>
</html>
