<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WeatherNow | Ashish Varghese</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
body{min-height:100vh;background:linear-gradient(135deg,#0f172a 0%,#1e293b 50%,#0f172a 100%);color:#fff;display:flex;flex-direction:column;align-items:center;padding:20px}
.back-link{position:fixed;top:16px;left:16px;z-index:100;color:#38bdf8;font-size:13px;text-decoration:none;display:flex;align-items:center;gap:6px;transition:.3s;background:rgba(15,23,42,.7);padding:8px 16px;border-radius:20px;backdrop-filter:blur(10px)}
.back-link:hover{background:rgba(56,189,248,.15)}
.app-header{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:900px;margin-bottom:24px;padding:0 10px;margin-top:40px}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,#38bdf8,#818cf8);display:flex;align-items:center;justify-content:center;font-size:22px}
.logo-text{font-size:22px;font-weight:800;letter-spacing:-.5px}
.logo-text span{background:linear-gradient(135deg,#38bdf8,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.search-box{display:flex;align-items:center;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:0 16px;width:340px;transition:.3s;gap:8px}
.search-box:focus-within{border-color:#38bdf8;background:rgba(56,189,248,.05);box-shadow:0 0 20px rgba(56,189,248,.1)}
.search-box i{color:#64748b;font-size:14px}
.search-box input{background:none;border:none;outline:none;color:#fff;font-size:14px;padding:12px;flex:1;font-family:'Inter',sans-serif}
.search-box input::placeholder{color:#64748b}
.search-btn{background:linear-gradient(135deg,#38bdf8,#818cf8);border:none;color:#fff;padding:7px 14px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:600;white-space:nowrap;transition:.2s}
.search-btn:hover{opacity:.85;transform:scale(1.03)}

/* Quick Cities */
.cities-bar{display:flex;gap:8px;width:100%;max-width:900px;overflow-x:auto;margin-bottom:20px;padding-bottom:8px}
.cities-bar::-webkit-scrollbar{display:none}
.city-chip{padding:8px 18px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:12px;color:#94a3b8;font-size:13px;cursor:pointer;white-space:nowrap;transition:.2s;font-family:'Inter',sans-serif;font-weight:500;border:none}
.city-chip:hover{border-color:#38bdf8;color:#fff;background:rgba(56,189,248,.1)}
.city-chip.active{background:linear-gradient(135deg,#38bdf8,#818cf8);color:#fff;font-weight:600}

/* Loading */
.loading{width:100%;max-width:900px;text-align:center;padding:60px;color:#64748b}
.spinner{width:48px;height:48px;border:3px solid rgba(56,189,248,.2);border-top-color:#38bdf8;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Error */
.error-box{width:100%;max-width:900px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:20px;padding:32px;text-align:center;color:#f87171}
.error-box i{font-size:40px;margin-bottom:12px;display:block}

/* Current Weather */
.current{width:100%;max-width:900px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:24px;padding:40px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;position:relative;overflow:hidden;backdrop-filter:blur(10px)}
.current::before{content:'';position:absolute;top:-50%;right:-20%;width:400px;height:400px;background:radial-gradient(circle,rgba(56,189,248,.08),transparent 70%);pointer-events:none}
.current-left{position:relative;z-index:1}
.location{display:flex;align-items:center;gap:8px;font-size:15px;color:#94a3b8;margin-bottom:8px;font-weight:500}
.location i{font-size:12px;color:#38bdf8}
.temp{font-size:84px;font-weight:800;letter-spacing:-4px;line-height:1;margin-bottom:8px}
.temp sup{font-size:32px;font-weight:400;color:#94a3b8;letter-spacing:0}
.condition{font-size:20px;font-weight:600;margin-bottom:4px;text-transform:capitalize}
.feels{font-size:14px;color:#94a3b8}
.current-right{text-align:center;position:relative;z-index:1}
.weather-icon-img{width:120px;height:120px;filter:drop-shadow(0 0 20px rgba(56,189,248,.3));animation:float 4s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.hi-lo{font-size:15px;color:#94a3b8;margin-top:8px}
.hi-lo span{color:#fff;font-weight:600}
.updated-time{font-size:12px;color:#475569;margin-top:6px}

/* Details Grid */
.details-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;width:100%;max-width:900px;margin-bottom:20px}
.detail-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:20px;text-align:center;transition:.3s;backdrop-filter:blur(5px)}
.detail-card:hover{border-color:rgba(56,189,248,.2);background:rgba(56,189,248,.04);transform:translateY(-4px)}
.detail-card i{font-size:22px;color:#38bdf8;margin-bottom:8px}
.detail-card .val{font-size:22px;font-weight:700;margin-bottom:2px}
.detail-card .label{font-size:12px;color:#64748b;text-transform:uppercase;letter-spacing:.5px}

/* Section Title */
.section-title{width:100%;max-width:900px;font-size:18px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.section-title i{color:#38bdf8}

/* Hourly */
.hourly-scroll{display:flex;gap:10px;width:100%;max-width:900px;overflow-x:auto;padding-bottom:12px;margin-bottom:20px}
.hourly-scroll::-webkit-scrollbar{height:4px}.hourly-scroll::-webkit-scrollbar-thumb{background:#334155;border-radius:4px}
.hour-card{min-width:80px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:16px 12px;text-align:center;flex-shrink:0;transition:.3s}
.hour-card:hover{border-color:rgba(56,189,248,.2);background:rgba(56,189,248,.05)}
.hour-card.now{background:linear-gradient(135deg,rgba(56,189,248,.15),rgba(129,140,248,.15));border-color:rgba(56,189,248,.3)}
.hour-time{font-size:12px;color:#94a3b8;margin-bottom:8px;font-weight:500}
.hour-icon{width:32px;height:32px;margin:0 auto 8px}
.hour-temp{font-size:16px;font-weight:700}

/* 5-Day Forecast */
.forecast{width:100%;max-width:900px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:20px;overflow:hidden;backdrop-filter:blur(5px);margin-bottom:30px}
.forecast-row{display:flex;align-items:center;padding:14px 24px;border-bottom:1px solid rgba(255,255,255,.04);transition:.2s}
.forecast-row:last-child{border:none}
.forecast-row:hover{background:rgba(255,255,255,.03)}
.f-day{width:100px;font-size:14px;font-weight:600}
.f-icon{width:40px;display:flex;align-items:center}
.f-icon img{width:36px;height:36px}
.f-condition{flex:1;font-size:13px;color:#94a3b8;padding:0 16px;text-transform:capitalize}
.f-bar{width:120px;height:6px;border-radius:3px;background:#1e293b;overflow:hidden;margin:0 16px}
.f-bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#38bdf8,#818cf8)}
.f-temps{font-size:14px;min-width:80px;text-align:right}
.f-temps .hi{font-weight:700}
.f-temps .lo{color:#64748b}

/* API Key Notice */
.api-notice{width:100%;max-width:900px;background:rgba(251,191,36,.06);border:1px solid rgba(251,191,36,.2);border-radius:16px;padding:16px 20px;margin-bottom:20px;display:flex;align-items:center;gap:12px;font-size:13px;color:#fbbf24}

@media(max-width:768px){.current{flex-direction:column;text-align:center;padding:28px 20px}.current-right{margin-top:16px}.details-grid{grid-template-columns:repeat(2,1fr)}.search-box{width:100%}.temp{font-size:64px}.app-header{flex-wrap:wrap;gap:12px}}
@media(max-width:500px){.app-header{flex-direction:column;gap:12px}.search-box{width:100%}.details-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<a href="../index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Portfolio</a>

<div class="app-header">
  <div class="logo">
    <div class="logo-icon">⛅</div>
    <div class="logo-text">Weather<span>Now</span></div>
  </div>
  <div class="search-box">
    <i class="fa-solid fa-magnifying-glass"></i>
    <input type="text" id="searchInput" placeholder="Search any city..." autocomplete="off">
    <button class="search-btn" onclick="searchCity()">Search</button>
  </div>
</div>

<div class="cities-bar" id="citiesBar">
  <button class="city-chip active" onclick="loadCity('Faridkot')">Faridkot</button>
  <button class="city-chip" onclick="loadCity('New Delhi')">New Delhi</button>
  <button class="city-chip" onclick="loadCity('Mumbai')">Mumbai</button>
  <button class="city-chip" onclick="loadCity('London')">London</button>
  <button class="city-chip" onclick="loadCity('New York')">New York</button>
  <button class="city-chip" onclick="loadCity('Tokyo')">Tokyo</button>
  <button class="city-chip" onclick="loadCity('Dubai')">Dubai</button>
  <button class="city-chip" onclick="loadCity('Sydney')">Sydney</button>
  <button class="city-chip" onclick="loadCity('Paris')">Paris</button>
</div>

<div id="mainContent">
  <div class="loading" id="loadingBox">
    <div class="spinner"></div>
    <p>Fetching real-time weather...</p>
  </div>
</div>

<script>
// =============================================
// FREE API KEY — Works immediately!
// Using Open-Meteo (100% free, no key needed)
// =============================================

const API_KEY = '4d8fb5b93d4af21d66a2948a4e7b4b7a'; // OpenWeatherMap free key
let currentCity = 'Faridkot';

const weatherCodeMap = {
  0: {label:'Clear Sky', icon:'01d'},
  1: {label:'Mainly Clear', icon:'01d'},
  2: {label:'Partly Cloudy', icon:'02d'},
  3: {label:'Overcast', icon:'04d'},
  45:{label:'Foggy', icon:'50d'},
  48:{label:'Icy Fog', icon:'50d'},
  51:{label:'Light Drizzle', icon:'09d'},
  53:{label:'Drizzle', icon:'09d'},
  55:{label:'Heavy Drizzle', icon:'09d'},
  61:{label:'Light Rain', icon:'10d'},
  63:{label:'Rain', icon:'10d'},
  65:{label:'Heavy Rain', icon:'10d'},
  71:{label:'Light Snow', icon:'13d'},
  73:{label:'Snow', icon:'13d'},
  75:{label:'Heavy Snow', icon:'13d'},
  80:{label:'Showers', icon:'09d'},
  81:{label:'Rain Showers', icon:'09d'},
  82:{label:'Heavy Showers', icon:'09d'},
  95:{label:'Thunderstorm', icon:'11d'},
  96:{label:'Thunderstorm', icon:'11d'},
  99:{label:'Heavy Thunderstorm', icon:'11d'},
};

function owIcon(code){ return `https://openweathermap.org/img/wn/${code}@2x.png`; }

async function geocodeCity(city){
  const r = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=en&format=json`);
  const d = await r.json();
  if(!d.results || d.results.length===0) throw new Error('City not found');
  return d.results[0];
}

async function fetchWeather(lat, lon){
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}`
    + `&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,surface_pressure,visibility`
    + `&hourly=temperature_2m,weather_code`
    + `&daily=weather_code,temperature_2m_max,temperature_2m_min,sunrise,sunset,uv_index_max`
    + `&wind_speed_unit=kmh&timezone=auto&forecast_days=6`;
  const r = await fetch(url);
  return await r.json();
}

async function loadCity(city){
  currentCity = city;
  // Update active chip
  document.querySelectorAll('.city-chip').forEach(c => c.classList.toggle('active', c.textContent.trim()===city));
  document.getElementById('searchInput').value = '';
  await fetchAndRender(city);
}

async function searchCity(){
  const q = document.getElementById('searchInput').value.trim();
  if(!q) return;
  currentCity = q;
  document.querySelectorAll('.city-chip').forEach(c => c.classList.remove('active'));
  await fetchAndRender(q);
}

document.getElementById('searchInput').addEventListener('keydown', e => {
  if(e.key==='Enter') searchCity();
});

async function fetchAndRender(city){
  const main = document.getElementById('mainContent');
  main.innerHTML = `<div class="loading"><div class="spinner"></div><p>Fetching real-time weather for <b>${city}</b>...</p></div>`;
  try {
    const geo = await geocodeCity(city);
    const data = await fetchWeather(geo.latitude, geo.longitude);
    renderAll(geo, data);
  } catch(e){
    main.innerHTML = `<div class="error-box"><i class="fa-solid fa-triangle-exclamation"></i><b>City not found!</b><p style="margin-top:8px;font-size:14px;color:#94a3b8">Try searching for a different city name.</p></div>`;
  }
}

function renderAll(geo, d){
  const c = d.current;
  const wc = weatherCodeMap[c.weather_code] || {label:'Unknown', icon:'01d'};
  const nowHour = new Date().getHours();
  const daily = d.daily;
  const hourly = d.hourly;

  // Get next 10 hours
  const hourStart = hourly.time.findIndex(t => new Date(t).getHours() >= nowHour);
  const hrs = [];
  for(let i=0;i<10;i++){
    const idx = hourStart+i;
    if(idx>=hourly.time.length) break;
    const hDate = new Date(hourly.time[idx]);
    const hWc = weatherCodeMap[hourly.weather_code[idx]] || {label:'',icon:'01d'};
    hrs.push({
      label: i===0 ? 'Now' : hDate.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}),
      temp: Math.round(hourly.temperature_2m[idx]),
      icon: owIcon(hWc.icon)
    });
  }

  // Days
  const dayNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const days = [];
  for(let i=1;i<daily.time.length;i++){
    const dt = new Date(daily.time[i]);
    const dwc = weatherCodeMap[daily.weather_code[i]] || {label:'Clear',icon:'01d'};
    days.push({
      day: i===1 ? 'Tomorrow' : dayNames[dt.getDay()],
      icon: owIcon(dwc.icon),
      condition: dwc.label,
      hi: Math.round(daily.temperature_2m_max[i]),
      lo: Math.round(daily.temperature_2m_min[i]),
    });
  }

  const sr = new Date(daily.sunrise[0]).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  const ss = new Date(daily.sunset[0]).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  const uv = Math.round(daily.uv_index_max[0]) || 'N/A';
  const vis = c.visibility ? Math.round(c.visibility/1000) : 'N/A';
  const now = new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  const tempHi = Math.round(daily.temperature_2m_max[0]);
  const tempLo = Math.round(daily.temperature_2m_min[0]);

  document.getElementById('mainContent').innerHTML = `
    <div class="current">
      <div class="current-left">
        <div class="location"><i class="fa-solid fa-location-dot"></i> ${geo.name}, ${geo.country}</div>
        <div class="temp">${Math.round(c.temperature_2m)}<sup>°C</sup></div>
        <div class="condition">${wc.label}</div>
        <div class="feels">Feels like ${Math.round(c.apparent_temperature)}°C</div>
        <div class="updated-time">Updated at ${now}</div>
      </div>
      <div class="current-right">
        <img src="${owIcon(wc.icon)}" alt="${wc.label}" class="weather-icon-img">
        <div class="hi-lo">H: <span>${tempHi}°</span> &nbsp; L: <span>${tempLo}°</span></div>
      </div>
    </div>

    <div class="details-grid">
      <div class="detail-card"><i class="fa-solid fa-droplet"></i><div class="val">${c.relative_humidity_2m}%</div><div class="label">Humidity</div></div>
      <div class="detail-card"><i class="fa-solid fa-wind"></i><div class="val">${Math.round(c.wind_speed_10m)} km/h</div><div class="label">Wind Speed</div></div>
      <div class="detail-card"><i class="fa-solid fa-sun"></i><div class="val">${uv}</div><div class="label">UV Index</div></div>
      <div class="detail-card"><i class="fa-solid fa-eye"></i><div class="val">${vis} km</div><div class="label">Visibility</div></div>
      <div class="detail-card"><i class="fa-solid fa-gauge"></i><div class="val">${Math.round(c.surface_pressure)} hPa</div><div class="label">Pressure</div></div>
      <div class="detail-card"><i class="fa-solid fa-temperature-half" style="color:#f87171"></i><div class="val">${Math.round(c.apparent_temperature)}°C</div><div class="label">Feels Like</div></div>
      <div class="detail-card"><i class="fa-solid fa-sun" style="color:#fbbf24"></i><div class="val">${sr}</div><div class="label">Sunrise</div></div>
      <div class="detail-card"><i class="fa-solid fa-moon" style="color:#818cf8"></i><div class="val">${ss}</div><div class="label">Sunset</div></div>
    </div>

    <div class="section-title"><i class="fa-solid fa-clock"></i> Hourly Forecast</div>
    <div class="hourly-scroll">
      ${hrs.map((h,i)=>`<div class="hour-card${i===0?' now':''}">
        <div class="hour-time">${h.label}</div>
        <img src="${h.icon}" class="hour-icon" alt="">
        <div class="hour-temp">${h.temp}°</div>
      </div>`).join('')}
    </div>

    <div class="section-title"><i class="fa-solid fa-calendar-days"></i> 5-Day Forecast</div>
    <div class="forecast">
      ${days.map(f=>`<div class="forecast-row">
        <div class="f-day">${f.day}</div>
        <div class="f-icon"><img src="${f.icon}" alt="${f.condition}"></div>
        <div class="f-condition">${f.condition}</div>
        <div class="f-bar"><div class="f-bar-fill" style="width:${Math.min(100,Math.round((f.hi/50)*100))}%"></div></div>
        <div class="f-temps"><span class="hi">${f.hi}°</span> / <span class="lo">${f.lo}°</span></div>
      </div>`).join('')}
    </div>
  `;
}

// Load default city on start
loadCity('Faridkot');
</script>
</body>
</html>
